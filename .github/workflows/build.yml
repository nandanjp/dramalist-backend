name: Build and Push Services

# Triggers: push to main pushes images; PRs build-only (no push).
on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    build:
        name: ${{ matrix.service }}
        runs-on: ubuntu-latest
        permissions:
            contents: read

        strategy:
            fail-fast: false # all services build even if one fails
            matrix:
                service:
                    - ai-service
                    - auth-service
                    - review-service
                    - search-service
                    - show-service
                    - user-service

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: nandanjp
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Extract metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: nandanjp/dramalist-${{ matrix.service }}
                  tags: |
                      type=sha,prefix=
                      type=raw,value=latest,enable={{is_default_branch}}

            - name: Build and push
              uses: docker/build-push-action@v6
              with:
                  context: ./services/${{ matrix.service }}
                  push: ${{ github.event_name != 'pull_request' }}
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  # Per-service cache scope prevents matrix jobs from stomping each other
                  cache-from: type=gha,scope=${{ matrix.service }}
                  cache-to: type=gha,scope=${{ matrix.service }},mode=max
